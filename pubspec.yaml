name: ai_agent_hub
description: AI Agent Hub - Secure Mobile Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # 状态管理
  provider: ^6.1.1
  get: ^4.6.6
  
  # 网络
  http: ^1.1.2
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # 安全 - 密码加密
  crypto: ^3.0.3
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  
  # 工具
  uuid: ^4.3.3
  intl: ^0.19.0
  logger: ^2.0.2
  archive: ^3.4.9
  share_plus: ^7.2.1

  # 图片选择
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # 文件预览
  flutter_markdown: ^0.6.18
  syntax_highlighter: ^0.1.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # 权限
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
